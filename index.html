<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Jhoan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Google Sans', sans-serif; background: #f8f9fa; margin: 0; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #dadce0; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        input, select { width: 100%; border: 1px solid #dadce0; border-radius: 10px; padding: 12px; margin: 8px 0; font-size: 16px; outline: none; box-sizing: border-box; }
        input:focus { border-color: #1a73e8; }
        .btn { background: #1a73e8; color: white; border: none; border-radius: 50px; padding: 14px; width: 100%; font-weight: 500; font-size: 16px; cursor: pointer; }
        .btn-out { background: transparent; color: #1a73e8; border: 1px solid #dadce0; margin-top: 10px; }
        .item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #dadce0; display: flex; justify-content: space-between; align-items: center; }
        h3 { margin: 0 0 10px 0; font-size: 18px; color: #1a73e8; }
        #loader { display: none; text-align: center; padding: 10px; color: #1a73e8; font-weight: 500; }
    </style>
</head>
<body>

<div id="auth-box" class="card">
    <h3>Iniciar Sesión</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn" onclick="auth('login')">Entrar</button>
    <button class="btn btn-out" onclick="auth('signup')">Crear Cuenta</button>
</div>

<div id="app-box" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <h2>Mis Visitas</h2>
        <button onclick="logout()" style="border:none; background:none; color:red">Salir</button>
    </div>
    
    <div class="card">
        <input type="text" id="nom" placeholder="Nombre de la persona">
        <input type="text" id="dir" placeholder="Dirección">
        <input type="number" id="tel" placeholder="Teléfono (ej: 04121234567)">
        <input type="text" id="tema" placeholder="Tema hablado hoy">
        <label style="font-size:12px; color:gray">Próxima visita:</label>
        <input type="datetime-local" id="cita">
        <div id="loader">Procesando...</div>
        <button class="btn" onclick="guardar()">Guardar en la Nube</button>
    </div>

    <div id="lista"></div>
</div>

<script>
    const S_URL = 'https://cgwyjtykhgrphdnbtcpe.supabase.co';
    const S_KEY = 'sb_publishable_Xyd7Os7EhFGC_go-C-jPlA_Jqoj0pfD';
    const supabase = window.supabase.createClient(S_URL, S_KEY);

    async function auth(tipo) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const { error } = tipo === 'login' ? await supabase.auth.signInWithPassword({email:e, password:p}) : await supabase.auth.signUp({email:e, password:p});
        if(error) alert("Error: " + error.message); else check();
    }

    async function logout() { await supabase.auth.signOut(); check(); }

    async function check() {
        const { data: { user } } = await supabase.auth.getUser();
        if(user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('app-box').style.display = 'block';
            ver();
        } else {
            document.getElementById('auth-box').style.display = 'block';
            document.getElementById('app-box').style.display = 'none';
        }
    }

    async function guardar() {
        document.getElementById('loader').style.display = 'block';
        const { data: { user } } = await supabase.auth.getUser();
        
        // CORRECCIÓN TOTAL DE COLUMNAS SEGÚN TU TABLA
        const { error } = await supabase.from('Registros').insert([{
            nombre: document.getElementById('nom').value,
            direccion: document.getElementById('dir').value,
            telefono: document.getElementById('tel').value,
            tema_hoy: document.getElementById('tema').value,
            proxima_cita: document.getElementById('cita').value,
            user_id: user.id
        }]);

        document.getElementById('loader').style.display = 'none';
        if(error) alert("Fallo al guardar: " + error.message); 
        else { 
            alert("¡Guardado con éxito!");
            ver(); 
        }
    }

    async function ver() {
        const { data } = await supabase.from('Registros').select('*').order('proxima_cita', {ascending: true});
        const div = document.getElementById('lista');
        div.innerHTML = '';
        data?.forEach(i => {
            div.innerHTML += `
                <div class="item">
                    <div>
                        <strong>${i.nombre}</strong><br>
                        <small>${i.direccion}</small>
                    </div>
                    <button onclick="window.open('https://wa.me/${i.telefono}')" style="background:#25D366; color:white; border:none; border-radius:10px; padding:8px">WA</button>
                </div>`;
        });
    }
    check();
</script>
</body>
</html>
