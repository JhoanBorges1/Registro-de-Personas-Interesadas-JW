<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Ministerial | Google UX</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-blue-hover: #1765cc;
            --google-gray-bg: #f8f9fa;
            --google-surface: #ffffff;
            --google-outline: #dadce0;
            --google-text-primary: #202124;
            --google-text-secondary: #5f6368;
            --google-error: #d93025;
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', 'Google Sans', sans-serif; background-color: var(--google-gray-bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }

        .app-container { width: 100%; max-width: 480px; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

        header { padding: 24px 8px 8px 8px; display: flex; align-items: center; gap: 12px; }
        header .logo-icon { color: var(--google-blue); font-size: 32px; }
        header h1 { font-family: 'Google Sans'; font-size: 22px; font-weight: 400; margin: 0; }

        .card { background: var(--google-surface); border-radius: 24px; padding: 24px; border: 1px solid var(--google-outline); transition: var(--transition-smooth); margin-bottom: 16px; }
        .section-header { font-family: 'Google Sans'; font-size: 14px; font-weight: 500; color: var(--google-blue); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: 500; color: var(--google-text-secondary); margin-bottom: 6px; margin-left: 4px; }
        .field { border: 1px solid var(--google-outline); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; background: var(--google-surface); }
        .field:focus-within { border-color: var(--google-blue); box-shadow: 0 0 0 1px var(--google-blue); }
        input, select, textarea { width: 100%; border: none; background: transparent; font-size: 16px; outline: none; font-family: inherit; color: inherit; }

        .phone-grid { display: grid; grid-template-columns: 100px 1fr; gap: 12px; }

        .btn-save { background: var(--google-blue); color: white; border: none; border-radius: 100px; padding: 14px 24px; font-family: 'Google Sans'; font-weight: 500; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 1px 2px rgba(60,64,67,0.3); transition: var(--transition-smooth); }
        .btn-save:hover { background: var(--google-blue-hover); box-shadow: 0 1px 3px rgba(60,64,67,0.2); }

        .agenda-item { padding: 16px; margin-bottom: 12px; border: 1px solid var(--google-outline); border-radius: 16px; display: flex; justify-content: space-between; align-items: center; transition: var(--transition-smooth); background: white; }
        .info h4 { margin: 0; font-family: 'Google Sans'; font-size: 16px; font-weight: 500; }
        .info p { margin: 4px 0 0; font-size: 13px; color: var(--google-text-secondary); display: flex; align-items: center; gap: 4px; }

        .actions { display: flex; gap: 4px; }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; cursor: pointer; color: var(--google-text-secondary); display: flex; align-items: center; justify-content: center; }
        .btn-icon:hover { background-color: rgba(95, 99, 104, 0.1); color: var(--google-text-primary); }
        .btn-icon.wa:hover { color: #25D366; }
        .btn-icon.delete:hover { color: var(--google-error); }

        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 48px; height: 48px; border: 4px solid #f3f3f3; border-top: 4px solid var(--google-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #323336; color: white; padding: 14px 24px; border-radius: 4px; transition: transform 0.3s; z-index: 3000; }

        #ficha-render { 
            position: absolute; 
            left: -9999px; 
            width: 500px; 
            background: white; 
            padding: 50px; 
            color: #202124; 
            font-family: 'Google Sans', 'Roboto', sans-serif;
        }
        .f-header { display: flex; align-items: center; gap: 15px; border-bottom: 2px solid var(--google-blue); padding-bottom: 20px; margin-bottom: 30px; }
        .f-header h2 { margin: 0; color: #1a73e8; font-size: 26px; font-weight: 400; }
        .f-item { margin-bottom: 25px; }
        .f-item b { display: block; font-size: 11px; color: #5f6368; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
        .f-item span { font-size: 19px; color: #202124; font-weight: 400; }
        .f-footer { margin-top: 40px; padding: 20px; background: #f8f9fa; border-radius: 12px; text-align: center; }
        .f-footer small { color: #5f6368; display: block; margin-bottom: 5px; }
        .f-footer h3 { margin: 0; color: var(--google-blue); font-size: 22px; font-weight: 500; }
    </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><p style="font-family:'Google Sans'; margin-top:20px; color:var(--google-blue)">Procesando...</p></div>
<div id="toast"><span id="toast-text"></span></div>

<div id="auth-screen" style="display: flex; flex-direction: column; width: 100%; align-items: center; justify-content: center; padding: 20px;">
    <span class="material-symbols-outlined" style="font-size: 64px; color: var(--google-blue); margin-bottom: 10px;">cloud_done</span>
    <h1 style="font-family: 'Google Sans'; font-weight: 400; margin-bottom: 30px;">Registro Ministerial</h1>
    <div class="card" style="max-width: 400px;">
        <div class="input-group"><label>Correo</label><div class="field"><input type="email" id="auth-email"></div></div>
        <div class="input-group"><label>Contraseña</label><div class="field"><input type="password" id="auth-password"></div></div>
        <button class="btn-save" onclick="handleAuth('login')">Entrar</button>
        <button class="btn-save" onclick="handleAuth('signup')" style="background:transparent; color:var(--google-blue); box-shadow:none; margin-top:10px; border:1px solid var(--google-outline)">Crear cuenta</button>
    </div>
</div>

<div id="app-screen" class="app-container" style="display:none">
    <header>
        <span class="material-symbols-outlined logo-icon">book_2</span>
        <h1>Registro Ministerial</h1>
        <button onclick="handleLogout()" style="margin-left:auto; border:none; background:none; color:var(--google-text-secondary); cursor:pointer">Salir</button>
    </header>

    <div class="card">
        <div class="section-header"><span class="material-symbols-outlined">edit_note</span> Nuevo Registro</div>
        <form id="registroForm">
            <div class="input-group"><label>Territorio</label><div class="field"><input type="text" id="territorio" placeholder="Ej: Manzana 14"></div></div>
            <div class="input-group"><label>Nombre</label><div class="field"><input type="text" id="nombre" required></div></div>
            <div class="input-group"><label>Dirección</label><div class="field"><input type="text" id="direccion" required></div></div>
            <div class="input-group">
                <label>WhatsApp</label>
                <div class="phone-grid">
                    <div class="field"><select id="prefijo"><option>0412</option><option>0424</option><option>0414</option><option>0422</option><option>0426</option><option>0416</option></select></div>
                    <div class="field"><input type="number" id="telefono" placeholder="1234567"></div>
                </div>
            </div>
            <div class="input-group"><label>Tema analizado hoy</label><div class="field"><input type="text" id="tema"></div></div>
            <div class="input-group"><label>Tema pendiente (Próxima visita)</label><div class="field"><input type="text" id="temaPendiente"></div></div>
            <div class="input-group"><label>Notas adicionales</label><div class="field"><textarea id="detalles" rows="2"></textarea></div></div>
            <div class="input-group"><label>Programar Revisita</label><div class="field"><input type="datetime-local" id="proxima" required></div></div>
            <button type="submit" class="btn-save"><span class="material-symbols-outlined">save</span> Guardar en la Nube</button>
        </form>
    </div>

    <div class="card">
        <div class="section-header"><span class="material-symbols-outlined">event_repeat</span> Próximas Visitas</div>
        <div id="listaAgenda"></div>
    </div>
</div>

<div id="ficha-render">
    <div class="f-header"><span class="material-symbols-outlined" style="color:#1a73e8; font-size:40px;">description</span><h2>Ficha de Visita</h2></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
        <div class="f-item"><b>Persona</b><span id="f-nombre"></span></div>
        <div class="f-item"><b>Territorio</b><span id="f-territorio"></span></div>
    </div>
    <div class="f-item"><b>Dirección</b><span id="f-dir"></span></div>
    <div class="f-item"><b>Tema Tratado Hoy</b><span id="f-tema"></span></div>
    <div class="f-item"><b>Tema Pendiente</b><span id="f-pendiente"></span></div>
    <div class="f-item"><b>Notas Adicionales</b><span id="f-notas"></span></div>
    <div class="f-footer"><small>CITA PROGRAMADA PARA</small><h3 id="f-cita"></h3></div>
</div>

<script>
    const SUPABASE_URL = 'https://cgwyjtykhgrphdnbtcpe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Xyd7Os7EhFGC_go-C-jPlA_Jqoj0pfD';
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const loader = document.getElementById('loading-overlay');

    // FORMATEO DE HORA (Inmune a Timezones)
    function getClean12h(isoStr) {
        if(!isoStr) return { full: "", time: "", fechaLarga: "" };
        const cleanStr = isoStr.replace('T', ' ').split('.')[0]; 
        const parts = cleanStr.split(' ');
        const dateParts = parts[0].split('-');
        const timeParts = parts[1].split(':');
        
        let hh = parseInt(timeParts[0]);
        let mm = timeParts[1];
        let ampm = hh >= 12 ? 'PM' : 'AM';
        hh = hh % 12;
        hh = hh ? hh : 12;
        
        const meses = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
        const mesStr = meses[parseInt(dateParts[1]) - 1];
        
        return {
            full: `${dateParts[2]} ${mesStr} • ${hh}:${mm} ${ampm}`,
            time: `${hh}:${mm} ${ampm}`,
            fechaLarga: `${dateParts[2]} de ${mesStr} a las ${hh}:${mm} ${ampm}`
        };
    }

    async function handleAuth(t) {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
        if(!e || !p) return alert("Completa los datos");
        loader.style.display = 'flex';
        const { error } = t === 'login' ? await _supabase.auth.signInWithPassword({email:e, password:p}) : await _supabase.auth.signUp({email:e, password:p});
        loader.style.display = 'none';
        if(error) alert(error.message); else checkUser();
    }

    async function handleLogout() { await _supabase.auth.signOut(); checkUser(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            render();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
        }
    }

    document.getElementById('registroForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        loader.style.display = 'flex';
        const { data: { user } } = await _supabase.auth.getUser();
        
        const { error } = await _supabase.from('Registros').insert([{
            territorio: document.getElementById('territorio').value,
            nombre: document.getElementById('nombre').value,
            direccion: document.getElementById('direccion').value,
            telefono: document.getElementById('prefijo').value + document.getElementById('telefono').value,
            tema_hoy: document.getElementById('tema').value,
            tema_pendiente: document.getElementById('temaPendiente').value,
            notas_y_detalles: document.getElementById('detalles').value,
            proxima_cita: document.getElementById('proxima').value,
            user_id: user.id
        }]);

        loader.style.display = 'none';
        if(error) alert("Error: " + error.message); else { e.target.reset(); render(); }
    });

    async function eliminar(id) {
        if(!confirm("¿Eliminar?")) return;
        await _supabase.from('Registros').delete().eq('id', id);
        render();
    }

    async function descargar(id) {
        loader.style.display = 'flex';
        const { data } = await _supabase.from('Registros').select('*').eq('id', id).single();
        const infoHora = getClean12h(data.proxima_cita);
        document.getElementById('f-nombre').innerText = data.nombre;
        document.getElementById('f-territorio').innerText = data.territorio || 'General';
        document.getElementById('f-dir').innerText = data.direccion;
        document.getElementById('f-tema').innerText = data.tema_hoy || 'No registrado';
        document.getElementById('f-pendiente').innerText = data.tema_pendiente || 'Ninguno';
        document.getElementById('f-notas').innerText = data.notas_y_detalles || 'Sin notas';
        document.getElementById('f-cita').innerText = infoHora.fechaLarga.toUpperCase();
        
        setTimeout(async () => {
            const canvas = await html2canvas(document.getElementById('ficha-render'), { scale: 3, backgroundColor: '#ffffff' });
            const link = document.createElement('a');
            link.download = `Ficha_${data.nombre}.png`;
            link.href = canvas.toDataURL();
            link.click();
            loader.style.display = 'none';
        }, 500);
    }

    async function render() {
        const { data } = await _supabase.from('Registros').select('*').order('proxima_cita', { ascending: true });
        const l = document.getElementById('listaAgenda');
        l.innerHTML = data?.length ? '' : '<p style="text-align:center;color:gray;font-size:12px;margin:20px">No hay registros</p>';
        
        data?.forEach(i => {
            const infoHora = getClean12h(i.proxima_cita);
            const msg = `Hola, ${i.nombre}. Te confirmo mi visita para hoy a las ${infoHora.time}. ¿Nos vemos?`;
            
            // --- LÓGICA DE WHATSAPP REFORZADA (TODAS LAS LÍNEAS) ---
            // 1. Convertimos a string por si acaso y quitamos todo lo que no sea número
            let soloNumeros = String(i.telefono).replace(/\D/g, '');
            
            // 2. Quitamos CUALQUIER cantidad de ceros a la izquierda que pueda tener
            soloNumeros = soloNumeros.replace(/^0+/, '');
            
            // 3. Si el número resultante ya tiene el 58, lo dejamos así. 
            // Si no lo tiene, se lo agregamos.
            if (!soloNumeros.startsWith('58')) {
                soloNumeros = '58' + soloNumeros;
            }
            
            // 4. Creamos el link final
            const linkWA = `https://wa.me/${soloNumeros}?text=${encodeURIComponent(msg)}`;
            // -------------------------------------------------------
            
            const div = document.createElement('div');
            div.className = 'agenda-item';
            div.innerHTML = `
                <div class="info">
                    <h4>${i.nombre}</h4>
                    <p><span class="material-symbols-outlined" style="font-size:16px">calendar_month</span> ${infoHora.full}</p>
                    <p><span class="material-symbols-outlined" style="font-size:16px">label</span> ${i.tema_pendiente || 'Pendiente'}</p>
                </div>
                <div class="actions">
                    <button class="btn-icon wa" onclick="window.open('${linkWA}')"><span class="material-symbols-outlined">chat</span></button>
                    <button class="btn-icon" onclick="descargar(${i.id})"><span class="material-symbols-outlined">file_download</span></button>
                    <button class="btn-icon delete" onclick="eliminar(${i.id})"><span class="material-symbols-outlined">delete</span></button>
                </div>`;
            l.appendChild(div);
        });
    }
    checkUser();
</script>
</body>
</html>
