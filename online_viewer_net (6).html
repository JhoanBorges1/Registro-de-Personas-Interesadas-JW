<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Ministerial Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3330/3330314.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --bg: #F9FAFB;
            --card: #FFFFFF;
            --black: #121212;
            --grey-text: #8E8E93;
            --line: #EAEAEA;
            --whatsapp: #25D366;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--black);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header h1 {
            font-size: 20px;
            font-weight: 700;
            text-align: left;
            margin: 20px 0;
            letter-spacing: -0.5px;
        }

        .card {
            background: var(--card);
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border: 1px solid var(--line);
        }

        .section-header {
            font-size: 11px;
            font-weight: 700;
            color: var(--grey-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 10px;
        }

        .input-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 10px; 
            font-weight: 700; 
            color: #AAA; 
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .field {
            border-bottom: 1px solid var(--line);
            padding: 8px 0;
            display: flex;
            align-items: center;
        }

        input, select, textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: var(--black);
            outline: none;
        }

        .phone-grid {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 15px;
        }

        .btn-save {
            background: var(--black);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-weight: 700;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }

        /* Agenda */
        .agenda-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info h4 { margin: 0; font-size: 15px; font-weight: 700; }
        .info p { margin: 4px 0 0; font-size: 12px; color: var(--grey-text); }

        .actions { display: flex; gap: 8px; }
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: white;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--black);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            transition: transform 0.4s ease;
            z-index: 1000;
        }

        #loading-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.9);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .book-icon {
            font-size: 50px;
            animation: fillBook 1.5s infinite;
        }

        @keyframes fillBook {
            0% { opacity: 0.2; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.2; transform: scale(0.9); }
        }

        /* FICHA DE EXPORTACIÓN */
        #ficha-render {
            position: absolute;
            left: -9999px;
            width: 400px;
            background: white;
            padding: 45px;
            border-radius: 40px;
        }

        .f-tag {
            background: #F0F0F0;
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .f-item { margin-bottom: 25px; padding-left: 10px; }
        .f-item b { display: block; font-size: 10px; color: #BBB; text-transform: uppercase; margin-bottom: 4px; }
        .f-item span { font-size: 18px; font-weight: 600; }
        
        .f-footer {
            border-top: 1px solid #EEE;
            margin-top: 30px;
            padding-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="ph-fill ph-book-open book-icon"></i>
    <p style="font-weight: 600; font-size: 12px; margin-top: 15px;">Generando Ficha...</p>
</div>

<div id="toast">Registro guardado</div>

<div class="app-container">
    <header><h1>Mis Revisitas</h1></header>

    <div class="card">
        <div class="section-header">Nuevo Registro</div>
        <form id="registroForm">
            <div class="input-group">
                <label>Territorio</label>
                <div class="field"><input type="text" id="territorio" placeholder="Zona o Manzana"></div>
            </div>

            <div class="input-group">
                <label>Nombre de la persona</label>
                <div class="field"><input type="text" id="nombre" required></div>
            </div>

            <div class="input-group">
                <label>Dirección</label>
                <div class="field"><input type="text" id="direccion" required></div>
            </div>

            <div class="input-group">
                <label>Teléfono</label>
                <div class="phone-grid">
                    <div class="field">
                        <select id="prefijo">
                            <option>0412</option><option>0424</option><option>0414</option>
                            <option>0422</option><option>0426</option><option>0416</option>
                        </select>
                    </div>
                    <div class="field"><input type="number" id="telefono"></div>
                </div>
            </div>

            <div class="section-header" style="margin-top:30px;">Conversación</div>
            
            <div class="input-group">
                <label>Tema analizado hoy</label>
                <div class="field"><input type="text" id="tema" placeholder="Ej: Por qué sufrimos"></div>
            </div>

            <div class="input-group">
                <label>Tema PENDIENTE para la próxima vez</label>
                <div class="field"><input type="text" id="temaPendiente" placeholder="Ej: Cómo terminará el mal"></div>
            </div>

            <div class="input-group">
                <label>Publicación / Categoría</label>
                <div class="field">
                    <select id="categoria">
                        <option>Tratado</option><option>Revista</option><option>Libro</option><option>JW.ORG</option><option>Folleto</option><option>Ninguna</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Notas Adicionales</label>
                <div class="field"><textarea id="detalles" rows="1" placeholder="Datos de familia, intereses..."></textarea></div>
            </div>

            <div class="input-group">
                <label>Fecha y Hora Revisita</label>
                <div class="field"><input type="datetime-local" id="proxima" required></div>
            </div>

            <button type="submit" class="btn-save">Guardar Registro</button>
        </form>
    </div>

    <div class="card">
        <div class="section-header">Agenda</div>
        <div id="listaAgenda"></div>
    </div>
</div>

<div id="ficha-render">
    <div class="f-tag"><i class="ph-fill ph-bookmark-simple" style="font-size: 28px;"></i><h2 style="margin:0; font-size: 20px;">Ficha Ministerial</h2></div>
    <div class="f-item"><b>Nombre</b><span id="f-nombre"></span></div>
    <div class="f-item"><b>Ubicación</b><span id="f-dir"></span></div>
    <div class="f-item"><b>Teléfono</b><span id="f-tel"></span></div>
    <div class="f-item"><b>Tema Analizado</b><span id="f-tema"></span></div>
    <div class="f-item"><b>Pendiente</b><span id="f-pendiente"></span></div>
    <div class="f-item"><b>Notas</b><span id="f-detalles"></span></div>
    <div class="f-footer"><b style="color:#999">Próxima Revisita</b><h2 id="f-cita-val" style="margin:10px 0 0; font-size: 24px;"></h2></div>
</div>

<script>
    const form = document.getElementById('registroForm');
    const lista = document.getElementById('listaAgenda');
    const toast = document.getElementById('toast');
    const loader = document.getElementById('loading-overlay');

    function showToast(msg) {
        toast.innerText = msg;
        toast.style.transform = "translateX(-50%) translateY(0)";
        setTimeout(() => { toast.style.transform = "translateX(-50%) translateY(100px)"; }, 3000);
    }

    function formatTimeOnly(dateStr) {
        if(!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleString('es-ES', { hour:'numeric', minute:'2-digit', hour12:true });
    }

    function formatFull(dateStr) {
        if(!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleString('es-ES', { day:'2-digit', month:'short', hour:'numeric', minute:'2-digit', hour12:true }).replace('.','');
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const data = {
            id: Date.now(),
            territorio: document.getElementById('territorio').value || 'General',
            nombre: document.getElementById('nombre').value,
            direccion: document.getElementById('direccion').value,
            telefono: document.getElementById('prefijo').value + document.getElementById('telefono').value,
            tema: document.getElementById('tema').value,
            temaPendiente: document.getElementById('temaPendiente').value,
            categoria: document.getElementById('categoria').value,
            detalles: document.getElementById('detalles').value,
            proxima: document.getElementById('proxima').value
        };

        let db = JSON.parse(localStorage.getItem('jw_v2_db')) || [];
        db.push(data);
        localStorage.setItem('jw_v2_db', JSON.stringify(db));
        form.reset();
        render();
        showToast("✓ Registro guardado");
    });

    function render() {
        let db = JSON.parse(localStorage.getItem('jw_v2_db')) || [];
        lista.innerHTML = '';
        db.sort((a,b) => new Date(a.proxima) - new Date(b.proxima));

        db.forEach(item => {
            const div = document.createElement('div');
            div.className = 'agenda-item';
            
            // Construir link WhatsApp
            const horaCita = formatTimeOnly(item.proxima);
            const msg = `¡Hola ${item.nombre}! ¿Cómo estás? Estoy atento para pasar por tu casa a las ${horaCita} para continuar con nuestra conversación. ¿Hoy te encontrarás en casa?`;
            const waLink = `https://wa.me/${item.telefono.replace('+','')}/?text=${encodeURIComponent(msg)}`;

            div.innerHTML = `
                <div class="info">
                    <h4>${item.nombre}</h4>
                    <p>🕒 ${formatFull(item.proxima)}</p>
                    <p>🎯 Pendiente: ${item.temaPendiente}</p>
                </div>
                <div class="actions">
                    <button class="btn-icon" onclick="window.open('${waLink}')"><i class="ph ph-whatsapp-logo" style="color:#25D366"></i></button>
                    <button class="btn-icon" onclick="descargar(${item.id})"><i class="ph ph-download-simple"></i></button>
                    <button class="btn-icon" onclick="eliminar(${item.id})"><i class="ph ph-trash"></i></button>
                </div>
            `;
            lista.appendChild(div);
        });
    }

    async function descargar(id) {
        loader.style.display = 'flex';
        const db = JSON.parse(localStorage.getItem('jw_v2_db'));
        const item = db.find(i => i.id === id);

        document.getElementById('f-nombre').innerText = item.nombre;
        document.getElementById('f-dir').innerText = item.direccion;
        document.getElementById('f-tel').innerText = item.telefono;
        document.getElementById('f-tema').innerText = item.tema;
        document.getElementById('f-pendiente').innerText = item.temaPendiente;
        document.getElementById('f-detalles').innerText = item.detalles;
        document.getElementById('f-cita-val').innerText = formatFull(item.proxima);

        const ficha = document.getElementById('ficha-render');
        const canvas = await html2canvas(ficha, { scale: 3 });
        const link = document.createElement('a');
        link.download = `Ficha_${item.nombre}.png`;
        link.href = canvas.toDataURL();
        link.click();
        
        loader.style.display = 'none';
        showToast("🖼️ Ficha lista");
    }

    function eliminar(id) {
        if(!confirm("¿Borrar?")) return;
        let db = JSON.parse(localStorage.getItem('jw_v2_db')).filter(i => i.id !== id);
        localStorage.setItem('jw_v2_db', JSON.stringify(db));
        render();
    }

    render();
</script>

</body>
</html>
